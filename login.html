<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FEX – Anmelden</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: clamp(20px, 5vw, 40px) clamp(10px, 3vw, 30px);
        }

        .login-box {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: 600;
            color: #333;
            margin-bottom: 0.2em;
        }

        .subtitle {
            color: #666;
            font-size: clamp(1rem, 3vw, 1.1rem);
            margin-bottom: 2em;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 1em;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.4em;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: clamp(12px, 3vw, 16px) clamp(14px, 3vw, 18px);
            font-size: clamp(1rem, 3vw, 1.1rem);
            font-family: inherit;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: #fff;
            color: #333;
            outline: none;
            transition: border-color 0.2s;
            user-select: text;
        }

        input:focus {
            border-color: #333;
        }

        .btn-login {
            width: 100%;
            padding: clamp(15px, 4vw, 20px);
            font-size: clamp(1rem, 3vw, 1.2rem);
            font-family: inherit;
            font-weight: 600;
            border: 3px solid #333;
            border-radius: 12px;
            background: #333;
            color: #fff;
            cursor: pointer;
            margin-top: 1.5em;
            transition: transform 0.1s ease, opacity 0.2s;
        }

        .btn-login:active {
            transform: scale(0.97);
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            color: #f44336;
            font-size: 0.9rem;
            margin-top: 1em;
            min-height: 1.3em;
            text-align: center;
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-login.loading .btn-text { display: none; }
        .btn-login.loading .spinner { display: block; }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>FEX</h1>
        <p class="subtitle">Förderung exekutiver Fähigkeiten<br>Melde dich an, um loszulegen.</p>

        <div class="form-group">
            <label for="email">E-Mail</label>
            <input
                type="email"
                id="email"
                placeholder="deine@schule.ch"
                autocomplete="email"
                inputmode="email"
            >
        </div>

        <div class="form-group">
            <label for="password">Passwort</label>
            <input
                type="password"
                id="password"
                placeholder="••••••••"
                autocomplete="current-password"
            >
        </div>

        <button class="btn-login" id="loginBtn" onclick="handleLogin()">
            <span class="btn-text">Anmelden</span>
            <div class="spinner"></div>
        </button>

        <p class="error-msg" id="errorMsg"></p>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://iqlwfvuqwovihrirkbbb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlxbHdmdnVxd292aWhyaXJrYmJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTUyNTksImV4cCI6MjA4ODM5MTI1OX0.boggE0Hh9VkhYGSnvcgt9DqJy5qDlxKwhV-MFZpjGwo'; // ← hier deinen Key eintragen

        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Bereits eingeloggt? → direkt weiter
        db.auth.getSession().then(({ data }) => {
            if (data.session) {
                window.location.href = 'index.html';
            }
        });

        // Enter-Taste
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleLogin();
        });

        async function handleLogin() {
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn      = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');

            errorMsg.textContent = '';

            if (!email || !password) {
                errorMsg.textContent = 'Bitte E-Mail und Passwort eingeben.';
                return;
            }

            // Lade-Zustand
            btn.classList.add('loading');
            btn.disabled = true;

            const { error } = await db.auth.signInWithPassword({ email, password });

            if (error) {
                btn.classList.remove('loading');
                btn.disabled = false;
                errorMsg.textContent = 'E-Mail oder Passwort ist falsch.';
                return;
            }

            // Erfolgreich → weiterleiten
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
